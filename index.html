<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>아기 사자 대시보드</title>
</head>
<body>
    <div class="sorting">
        <div class="controlPanel">
            <div class="btnGroup">
                <button class="btnAdd" id="addBtn">추가</button>
                <button class="btnDelete" id="deleteBtn">삭제</button>
            </div>
            <div class="total" id="total">총 0명</div>
        </div>

        <div class="formSection hidden" id="addFormSection">
            <form id="addLionForm">
                <div class="formGrid">
                    <div class="inputGroup">
                        <label>이름</label>
                        <input type="text" id="fName" required>
                    </div>
                    <div class="inputGroup">
                        <label>파트</label>
                        <select id="fTrack" required>
                            <option value="Frontend">Frontend</option>
                            <option value="Backend">Backend</option>
                            <option value="Design">Design</option>
                        </select>
                    </div>
                    <div class="inputGroup full">
                        <label>관심 기술</label>
                        <input type="text" id="fTech" required>
                    </div>
                    <div class="inputGroup full">
                        <label>한 줄 소개</label>
                        <input type="text" id="fShort" required>
                    </div>
                    <div class="inputGroup full">
                        <label>상세 자기소개</label>
                        <textarea id="fDetail" rows="3" required></textarea>
                    </div>
                    <div class="inputGroup">
                        <label>이메일</label>
                        <input type="email" id="fEmail" required>
                    </div>
                    <div class="inputGroup">
                        <label>전화번호</label>
                        <input type="text" id="fPhone" required>
                    </div>
                </div>
                <div class="formButtons">
                    <button type="button" class="btnCancel" id="cancelBtn">취소</button>
                    <button type="submit" class="btnSubmit">추가하기</button>
                </div>
            </form>
        </div>

        <div class="profileBoxes"></div>
        <div class="profileDetailsBoxes"></div>
    </div>
    <script src="script.js"></script>
</body>
</html>
